    <path d="M195 260 H205 V380 H195 Z" fill="#2E608C" fill-opacity="0.3"/>
    <circle cx="200" cy="300" r="4" fill="#FFFFFF" fill-opacity="0.6"/>
    <circle cx="200" cy="325" r="4" fill="#FFFFFF" fill-opacity="0.6"/>
    <circle cx="200" cy="350" r="4" fill="#FFFFFF" fill-opacity="0.6"/>

    <!-- Fabric Folds -->
    <path d="M110 350 Q130 360 140 350" fill="none" stroke="black" stroke-opacity="0.05" stroke-width="2"/>
    <path d="M290 350 Q270 360 260 350" fill="none" stroke="black" stroke-opacity="0.05" stroke-width="2"/>

    <!-- Collar -->
