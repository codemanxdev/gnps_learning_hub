  <!-- DEFAULT: Blue Turban (Built-in) -->
  <g>
    <path d="M184 110 L200 80 L216 110 H184 Z" fill="#2E608C"/> <!-- Fifty -->
    <path d="M84 104 C84 30 130 0 200 0 C270 0 316 30 316 104 V124 H84 V104 Z" fill="#3E7FB8"/>
