    <path d="M200 260 L225 260 L210 290 L200 260 Z" fill="#5A9AD4" fill-opacity="0.5"/>
  </g>

  <!-- Base: Skin & Face -->
  <circle cx="80" cy="164" r="20" fill="#E8B786"/> <!-- Left Ear -->
  <circle cx="320" cy="164" r="20" fill="#E8B786"/> <!-- Right Ear -->
  <circle cx="200" cy="164" r="124" fill="#E8B786"/> <!-- Face -->

  <!-- Facial Features -->
  <!-- Eyebrows -->
  <path d="M140 145 Q160 135 180 145" fill="none" stroke="#2B2118" stroke-width="6" stroke-linecap="round"/>
  <path d="M220 145 Q240 135 260 145" fill="none" stroke="#2B2118" stroke-width="6" stroke-linecap="round"/>

  <!-- Eyes -->
  <circle cx="160" cy="164" r="16" fill="#fff" stroke="#2B2118" stroke-width="3"/>
  <circle cx="160" cy="164" r="8" fill="#2B2118"/>
  <circle cx="240" cy="164" r="16" fill="#fff" stroke="#2B2118" stroke-width="3"/>
  <circle cx="240" cy="164" r="8" fill="#2B2118"/>

  <!-- Nose Bridge Hint -->
  <path d="M195 170 Q200 165 205 170" fill="none" stroke="black" stroke-opacity="0.05" stroke-width="2"/>

  <!-- Mouth -->
