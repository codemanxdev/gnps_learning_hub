    <path d="M316 104 C316 104 300 40 200 40 C140 40 90 70 90 100 L84 104 L200 70 L316 104 Z" fill="#3E7FB8"/>
    <path d="M84 104 C84 104 100 40 200 40 C260 40 310 70 310 100 L316 104 L200 70 L84 104 Z" fill="#2E608C"/>
    <!-- Nok -->
