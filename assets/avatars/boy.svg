<svg width="400" height="500" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Sikh boy avatar (Default High Detail)</title>

  <!-- DEFAULT: Blue Kurta with Realistic Arms & Shading -->
  <g>
    <!-- Left Arm & Sleeve (Ensuring overlap with shoulder) -->
    <path d="M120 280 Q80 285 55 380 Q45 440 50 480 H115 V280 Z" fill="#2E608C"/>
    <!-- Right Arm & Sleeve (Ensuring overlap with shoulder) -->
    <path d="M280 280 Q320 285 345 380 Q355 440 350 480 H285 V280 Z" fill="#2E608C"/>

