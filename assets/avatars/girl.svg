  <circle cx="160" cy="164" r="8" fill="#2B2118"/>
  <circle cx="240" cy="164" r="16" fill="#fff" stroke="#2B2118" stroke-width="3"/>
  <circle cx="240" cy="164" r="8" fill="#2B2118"/>

  <!-- Mouth -->
