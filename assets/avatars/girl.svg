<svg width="400" height="500" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Sikh girl avatar (Default High Detail)</title>

  <!-- DEFAULT: Pink Kurti with Realistic Arms & Shading -->
  <g>
