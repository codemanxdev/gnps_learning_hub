name: gnps_learning_hub
description: "GNPS Learning Hub - A gamified Punjabi learning app for kids."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  firebase_core: ^3.1.0
  cloud_firestore: ^5.0.1
  flutter_tts: ^4.2.5
  flutter_riverpod: ^2.5.1
  audioplayers: ^6.8.1
  flutter_svg: ^2.0.10
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo/logo.jpg
    - assets/sounds/
    - assets/avatars/
    - assets/shop/
